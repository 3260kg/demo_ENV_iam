<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bankwell Verification</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #eef1ec;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #123c37;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #f8f4ec;
      border: 1px solid #d5ddd4;
      box-shadow: 0 18px 42px rgba(18, 60, 55, 0.14);
      overflow: hidden;
    }

    .top-bar {
      height: 18px;
      background: #9bb8a8;
    }

    .inner {
      padding: 28px;
    }

    .logo {
      max-height: 56px;
      display: block;
      margin: 0 auto 22px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      color: #123c37;
    }

    p {
      color: #49625d;
      line-height: 1.6;
    }

    .note {
      margin: 22px 0;
      padding: 14px 16px;
      background: rgba(18, 60, 55, 0.08);
      border: 1px solid rgba(18, 60, 55, 0.16);
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    button {
      padding: 15px 18px;
      font: inherit;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    #continueBtn {
      background: #123c37;
      color: #f8f4ec;
    }

    #continueBtn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    #copyBtn {
      background: transparent;
      border: 1px solid #d5ddd4;
      color: #123c37;
    }

    .hidden {
      display: none;
    }

    #status {
      margin-top: 14px;
      color: #49625d;
    }

    #status.error {
      color: #8b2d2d;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar"></div>
    <div class="inner">
      <img
        class="logo"
        src="https://cdn.prod.website-files.com/663127e3c76d02959ac5dc09/66a2ae1b424758a6f3be1f62_BW_Logo_Dark.svg"
        alt="Bankwell logo"
      />

      <h1>Continue your Bankwell verification</h1>
      <p>This secure step confirms that you intended to continue the identity verification process.</p>

      <div class="note">
        If this page opened from a message preview, nothing happens until you press Continue.
      </div>

      <div class="actions">
        <button id="continueBtn" disabled>Continue</button>
        <button id="copyBtn" class="hidden" type="button">Copy link</button>
      </div>

      <div id="status">Preparing secure link…</div>
    </div>
  </div>

  <script>
    (function () {
      const continueBtn = document.getElementById('continueBtn');
      const copyBtn = document.getElementById('copyBtn');
      const status = document.getElementById('status');

      function setStatus(message, isError) {
        status.textContent = message;
        status.classList.toggle('error', !!isError);
      }

      function getDestination() {
        const hash = window.location.hash ? window.location.hash.substring(1) : '';
        if (!hash) return null;
        return hash;
      }

      const destination = getDestination();

      if (!destination || !destination.startsWith('http')) {
        setStatus('This verification link is missing or invalid.', true);
        continueBtn.disabled = true;
        return;
      }

      continueBtn.disabled = false;
      copyBtn.classList.remove('hidden');
      setStatus('Ready. Tap Continue to securely resume verification.');

      continueBtn.addEventListener('click', function () {
        setStatus('Redirecting…');
        window.location.assign(destination);
      });

      copyBtn.addEventListener('click', async function () {
        try {
          await navigator.clipboard.writeText(destination);
          setStatus('Verification link copied.');
        } catch (err) {
          setStatus('Copy failed on this device.', true);
        }
      });
    })();
  </script>
</body>
</html>
